<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables - Bun Cha POS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Fixed Header -->
    <header class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-lg fixed top-0 left-0 right-0 z-50">
        <div class="px-6 py-3 flex items-center justify-between">
            <!-- Restaurant Name -->
            <div class="flex-1">
                <h1 class="text-xl tracking-wide font-semibold">Bún chả Hà Nội</h1>
                <p class="text-blue-200 text-xs">Minh Hương</p>
            </div>

            <!-- Navigation -->
            <nav class="flex gap-3">
                <a href="/tables.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-700 shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span>Waiter</span>
                </a>
                <a href="/kitchen.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-800/50 hover:bg-blue-700/70">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    <span>Kitchen</span>
                </a>
                <a href="/excel.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-800/50 hover:bg-blue-700/70">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <span>Excel</span>
                </a>
            </nav>

            <!-- Connection Status -->
            <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 bg-blue-800 rounded-full text-xs">
                <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                <span class="text-blue-100">Connected</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-20 px-6 pb-6">
        <div class="max-w-7xl mx-auto">
            <!-- Sub Navigation -->
            <div class="flex items-center justify-center gap-4 mb-8">
                <a href="/tables.html" class="w-14 h-14 rounded-full bg-blue-900 text-white flex items-center justify-center shadow-md transition-all hover:bg-blue-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </a>
                <a href="/waiter.html" class="w-14 h-14 rounded-full bg-blue-100 text-blue-900 flex items-center justify-center shadow-sm transition-all hover:bg-blue-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </a>
            </div>

            <!-- Page Header -->
            <div class="mb-6">
                <h1 class="text-2xl font-semibold text-slate-800">Tables</h1>
                <p class="text-slate-500 text-sm mt-1">Select a table to create or view orders</p>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <!-- Left: Table Selection -->
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <h2 class="text-lg font-semibold text-slate-800">Select Table</h2>
                    </div>

                    <!-- Tables Grid -->
                    <div class="grid grid-cols-5 gap-4 mb-6">
                        <script>
                            for (let i = 1; i <= 10; i++) {
                                document.write(`<button id="table-${i}" onclick="selectTable(${i})" class="h-20 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-700 hover:bg-blue-50 hover:border-blue-300 transition-all flex flex-col items-center justify-center gap-1">
                                    <span class="text-2xl font-semibold">${i}</span>
                                </button>`);
                            }
                        </script>
                    </div>

                    <!-- Take-away & Delivery -->
                    <div class="space-y-4">
                        <button onclick="selectTable('Takeaway')" id="table-takeaway" class="w-full h-16 rounded-xl border-2 border-blue-200 bg-blue-50 text-blue-900 hover:bg-blue-100 hover:border-blue-300 transition-all flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/>
                            </svg>
                            <span class="font-medium">Take away</span>
                        </button>
                        <button onclick="selectTable('Goka (Delivery)')" id="table-goka" class="w-full h-16 rounded-xl border-2 border-purple-200 bg-purple-50 text-purple-900 hover:bg-purple-100 hover:border-purple-300 transition-all flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                            <span class="font-medium">Goka (Delivery)</span>
                        </button>
                    </div>
                </div>

                <!-- Right: Active & Served Orders -->
                <div class="space-y-6">
                    <!-- Active Orders -->
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center gap-2 mb-1">
                            <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <h2 class="text-lg font-semibold text-slate-800">Active Orders</h2>
                            <span id="active-count" class="ml-auto bg-amber-100 text-amber-900 px-3 py-1 rounded-full text-xs font-medium">0</span>
                        </div>
                        <p class="text-xs text-slate-500 mb-4 ml-7">All pending orders (Tables, Takeaway, Goka)</p>
                        <div id="active-orders" class="space-y-3 max-h-[280px] overflow-y-auto">
                            <p class="text-slate-400 text-center py-8 text-sm">No active orders</p>
                        </div>
                    </div>

                    <!-- Served Orders -->
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center gap-2 mb-1">
                            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <h2 class="text-lg font-semibold text-slate-800">Served</h2>
                            <span id="served-count" class="ml-auto bg-blue-100 text-blue-900 px-3 py-1 rounded-full text-xs font-medium">0</span>
                        </div>
                        <p class="text-xs text-slate-500 mb-4 ml-7">Ready for payment</p>
                        <div id="served-orders" class="space-y-3 max-h-[280px] overflow-y-auto">
                            <p class="text-slate-400 text-center py-8 text-sm">No served orders</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 px-4 py-3 bg-slate-800 text-white rounded-lg shadow-lg text-sm font-medium opacity-0 invisible transition-all duration-300 z-50"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        var API_BASE = 'http://localhost:3003';
        var unavailableTables = new Set();
        var socket;

        document.addEventListener('DOMContentLoaded', function() {
            initSocket();
            loadTableStatus();
            loadServedOrders();
        });

        function initSocket() {
            socket = io();
            var statusEl = document.getElementById('connection-status');

            socket.on('connect', function() {
                statusEl.innerHTML = '<span class="w-2 h-2 bg-green-400 rounded-full"></span><span class="text-blue-100">Connected</span>';
            });

            socket.on('disconnect', function() {
                statusEl.innerHTML = '<span class="w-2 h-2 bg-amber-400 rounded-full"></span><span class="text-amber-200">Reconnecting...</span>';
            });

            socket.on('order_served_update', function() {
                loadTableStatus();
                loadServedOrders();
            });

            socket.on('order_paid', function() {
                loadTableStatus();
            });
        }

        function loadTableStatus() {
            fetch(API_BASE + '/api/orders/active')
                .then(function(res) { return res.json(); })
                .then(function(orders) {
                    unavailableTables.clear();
                    orders.forEach(function(order) {
                        if (order.table !== 'Takeaway' && order.table !== 'Goka (Delivery)') {
                            unavailableTables.add(order.table);
                        }
                    });
                    updateTableUI();
                    renderActiveOrders(orders);
                })
                .catch(function(err) {
                    console.error('Failed to load table status:', err);
                });
        }

        function updateTableUI() {
            for (var i = 1; i <= 10; i++) {
                var btn = document.getElementById('table-' + i);
                if (btn) {
                    var tableName = 'Table ' + i;
                    var hasOrder = unavailableTables.has(tableName) || unavailableTables.has('' + i);
                    btn.className = 'h-20 rounded-xl border-2 transition-all flex flex-col items-center justify-center gap-1 ' +
                        (hasOrder ? 'bg-amber-50 border-amber-300 text-amber-900' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-blue-50 hover:border-blue-300');
                }
            }
        }

        function renderActiveOrders(orders) {
            var container = document.getElementById('active-orders');
            var countEl = document.getElementById('active-count');

            // Show ALL orders including Takeaway and Goka (Delivery)
            countEl.textContent = orders.length;

            if (orders.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-8 text-sm">No active orders</p>';
                return;
            }

            var html = '';
            orders.forEach(function(order) {
                // Determine badge color based on order type
                var badgeColor = 'bg-amber-200 text-amber-900'; // default
                if (order.table === 'Takeaway') {
                    badgeColor = 'bg-blue-200 text-blue-900';
                } else if (order.table === 'Goka (Delivery)') {
                    badgeColor = 'bg-purple-200 text-purple-900';
                }

                var borderClass = 'border-amber-200 bg-amber-50';
                if (order.table === 'Takeaway') {
                    borderClass = 'border-blue-200 bg-blue-50';
                } else if (order.table === 'Goka (Delivery)') {
                    borderClass = 'border-purple-200 bg-purple-50';
                }

                html += '<div class="border-2 ' + borderClass + ' rounded-xl p-5">';
                html += '<div class="flex justify-between items-start mb-4">';
                html += '<div><div class="text-lg text-slate-900 font-medium">' + order.table + '</div>';
                html += '<div class="text-sm text-slate-600 mt-1">' + order.order_id + ' • ' + order.items.length + ' item(s)</div></div>';
                html += '<span class="' + badgeColor + ' px-2 py-1 rounded text-xs font-medium">Pending</span>';
                html += '</div>';
                html += '<div class="space-y-2 mb-4 text-sm">';
                order.items.forEach(function(item) {
                    html += '<div class="flex justify-between text-slate-700">';
                    html += '<span>' + item.qty + '× ' + item.item_name + '</span>';
                    html += '</div>';
                });
                if (order.note && order.note.trim()) {
                    html += '<div class="text-xs text-slate-500 italic mt-2">Note: ' + order.note + '</div>';
                }
                html += '</div>';
                html += '<button onclick="goToOrder(\'' + order.order_id + '\')" class="w-full py-3 bg-blue-900 text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors flex items-center justify-center gap-2">';
                html += '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>';
                html += 'View / Edit</button>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function loadServedOrders() {
            fetch(API_BASE + '/api/orders/served')
                .then(function(res) { return res.json(); })
                .then(function(orders) {
                    renderServedOrders(orders);
                })
                .catch(function(err) {
                    console.error('Failed to load served orders:', err);
                });
        }

        function renderServedOrders(orders) {
            var container = document.getElementById('served-orders');
            var countEl = document.getElementById('served-count');

            // Show ALL orders including Takeaway and Goka (Delivery)
            countEl.textContent = orders.length;

            if (orders.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-8 text-sm">No served orders</p>';
                return;
            }

            var html = '';
            orders.forEach(function(order) {
                var total = order.order_total.toLocaleString('vi-VN');

                // Determine border color based on order type
                var borderClass = 'border-blue-200 bg-blue-50';
                if (order.table === 'Takeaway') {
                    borderClass = 'border-blue-300 bg-blue-100';
                } else if (order.table === 'Goka (Delivery)') {
                    borderClass = 'border-purple-300 bg-purple-100';
                }

                html += '<div class="border-2 ' + borderClass + ' rounded-xl p-5">';
                html += '<div class="flex justify-between items-center mb-4">';
                html += '<div class="text-lg text-slate-900 font-medium">' + order.table + '</div>';
                html += '<div class="text-xl text-slate-900 font-semibold">' + total + ' ₫</div>';
                html += '</div>';
                html += '<button onclick="markPaid(\'' + order.order_id + '\')" class="w-full py-3 bg-blue-900 text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors flex items-center justify-center gap-2">';
                html += '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>';
                html += 'Mark as Paid</button></div>';
            });
            container.innerHTML = html;
        }

        function markPaid(orderId) {
            fetch(API_BASE + '/api/orders/' + orderId + '/paid', { method: 'POST' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    loadTableStatus();
                    loadServedOrders();
                    showToast('Marked as paid');
                })
                .catch(function(err) {
                    console.error('Failed to mark paid:', err);
                });
        }

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'invisible');
            setTimeout(function() {
                toast.classList.add('opacity-0', 'invisible');
            }, 1500);
        }

        function selectTable(table) {
            var tableName = (typeof table === 'number') ? 'Table ' + table : table;

            if (typeof table === 'number') {
                if (unavailableTables.has(tableName) || unavailableTables.has('' + table)) {
                    alert('This table is currently occupied!');
                    return;
                }
            }

            window.location.href = '/waiter.html?table=' + encodeURIComponent(tableName);
        }

        function goToOrder(orderId) {
            window.location.href = '/waiter.html?order_id=' + encodeURIComponent(orderId);
        }
    </script>
</body>
</html>
