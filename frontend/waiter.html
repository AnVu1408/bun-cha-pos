<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order - Bun Cha POS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Fixed Header -->
    <header class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-lg fixed top-0 left-0 right-0 z-50">
        <div class="px-6 py-3 flex items-center justify-between">
            <!-- Restaurant Name -->
            <div class="flex-1">
                <h1 class="text-xl tracking-wide font-semibold">Bún chả Hà Nội</h1>
                <p class="text-blue-200 text-xs">Minh Hương</p>
            </div>

            <!-- Navigation -->
            <nav class="flex gap-3">
                <a href="/tables.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-700 shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span>Waiter</span>
                </a>
                <a href="/kitchen.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-800/50 hover:bg-blue-700/70">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    <span>Kitchen</span>
                </a>
                <a href="/excel.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-800/50 hover:bg-blue-700/70">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <span>Excel</span>
                </a>
            </nav>

            <!-- Right Side -->
            <div class="flex items-center gap-3">
                <span id="selected-table-display" class="bg-blue-800 text-white px-4 py-2 rounded-lg text-sm font-medium">No table</span>
                <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 bg-blue-800 rounded-full text-xs">
                    <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                    <span class="text-blue-100">Connected</span>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-20 px-6 pb-6">
        <div class="max-w-7xl mx-auto">
            <!-- Sub Navigation -->
            <div class="flex items-center justify-center gap-4 mb-8">
                <a href="/tables.html" class="w-14 h-14 rounded-full bg-blue-100 text-blue-900 flex items-center justify-center shadow-sm transition-all hover:bg-blue-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </a>
                <a href="/waiter.html" class="w-14 h-14 rounded-full bg-blue-900 text-white flex items-center justify-center shadow-md transition-all hover:bg-blue-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </a>
            </div>

            <div class="grid grid-cols-3 gap-6">
                <!-- Menu Section -->
                <div class="col-span-2 bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
                                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                                </svg>
                            </div>
                            <h2 class="text-lg font-semibold text-slate-800">Menu</h2>
                        </div>
                    </div>

                    <!-- Menu Items Grid -->
                    <div id="menu-grid" class="grid grid-cols-3 gap-3 max-h-[calc(100vh-340px)] overflow-y-auto pr-2">
                        <p class="text-slate-400 text-center py-8 col-span-3">Loading...</p>
                    </div>
                </div>

                <!-- Cart Section -->
                <div class="bg-white rounded-xl shadow-sm p-6 flex flex-col">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-blue-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                        </div>
                        <h2 class="text-lg font-semibold text-slate-800">Order Cart</h2>
                    </div>

                    <!-- Cart Items -->
                    <div id="cart-items" class="flex-1 space-y-3 overflow-y-auto">
                        <div class="flex items-center justify-center h-full">
                            <p class="text-slate-400 text-center text-sm">Tap items to add</p>
                        </div>
                    </div>

                    <!-- Cart Footer -->
                    <div class="border-t-2 border-slate-200 pt-4 mt-4">
                        <div class="mb-4">
                            <label class="text-sm font-medium text-slate-600 mb-2 block">Order Note</label>
                            <textarea id="order-note" class="w-full p-3 border-2 border-slate-200 rounded-lg text-sm resize-none focus:border-blue-500 focus:outline-none" placeholder="Add notes..." rows="2"></textarea>
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-lg text-slate-700">Total:</span>
                            <span id="cart-total" class="text-3xl text-blue-900 font-semibold">0 ₫</span>
                        </div>
                        <button id="submit-btn" onclick="submitOrder()" disabled class="w-full py-3.5 bg-blue-900 text-white rounded-lg font-medium hover:bg-blue-800 transition-colors disabled:bg-slate-300 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            <span id="submit-text">Submit Order</span>
                        </button>
                        <button onclick="goBackToTables()" class="w-full mt-3 py-3 bg-slate-100 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-200 transition-colors">Back to Tables</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 px-4 py-3 bg-slate-800 text-white rounded-lg shadow-lg text-sm font-medium opacity-0 invisible transition-all duration-300 z-50"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        var API_BASE = 'http://localhost:3003';
        var menu = [];
        var cart = {};
        var selectedTable = null;
        var isSpecialTable = false;
        var existingOrder = null;
        var newItemsOnly = {};
        var editingOrderId = null;

        var urlParams = new URLSearchParams(window.location.search);
        var tableParam = urlParams.get('table');
        var orderIdParam = urlParams.get('order_id');

        document.addEventListener('DOMContentLoaded', function() {
            if (orderIdParam) {
                // Editing a specific order (for Takeaway/Goka orders)
                editingOrderId = decodeURIComponent(orderIdParam);
                loadOrderById(editingOrderId);
            } else if (tableParam) {
                // Creating a new order or editing table's active order
                selectedTable = decodeURIComponent(tableParam);
                isSpecialTable = (selectedTable === 'Takeaway' || selectedTable === 'Goka (Delivery)');
                document.getElementById('selected-table-display').textContent = selectedTable;
            }

            loadMenu();
            // Only load existing order if not editing a specific order and not a special table
            if (!editingOrderId && !isSpecialTable) {
                loadExistingOrder();
            }
            initSocket();
        });

        function loadOrderById(orderId) {
            fetch(API_BASE + '/api/orders/all')
                .then(function(res) { return res.json(); })
                .then(function(orders) {
                    var order = orders.find(function(o) { return o.order_id === orderId; });
                    if (order) {
                        existingOrder = order;
                        selectedTable = order.table;
                        isSpecialTable = (selectedTable === 'Takeaway' || selectedTable === 'Goka (Delivery)');
                        document.getElementById('selected-table-display').innerHTML =
                            selectedTable + ' <span class="text-xs bg-amber-100 text-amber-900 px-2 py-0.5 rounded ml-2">Editing ' + orderId + '</span>';

                        cart = {};
                        order.items.forEach(function(item) {
                            cart[item.item_id] = item.qty;
                        });
                        if (order.note) {
                            document.getElementById('order-note').value = order.note;
                        }
                        renderMenu();
                        renderCart();
                    }
                })
                .catch(function(err) {
                    console.error('Failed to load order:', err);
                });
        }

        function loadMenu() {
            fetch(API_BASE + '/api/menu')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    menu = data;
                    renderMenu();
                })
                .catch(function(err) {
                    console.error('Failed to load menu:', err);
                    document.getElementById('menu-grid').innerHTML = '<p class="text-red-500 text-center py-8 col-span-3">Failed to load menu</p>';
                });
        }

        function loadExistingOrder() {
            if (!selectedTable) return;

            fetch(API_BASE + '/api/orders/table/' + encodeURIComponent(selectedTable))
                .then(function(res) {
                    if (!res.ok) throw new Error('No existing order');
                    return res.json();
                })
                .then(function(order) {
                    existingOrder = order;
                    cart = {};
                    order.items.forEach(function(item) {
                        cart[item.item_id] = item.qty;
                    });
                    if (order.note) {
                        document.getElementById('order-note').value = order.note;
                    }
                    document.getElementById('selected-table-display').innerHTML =
                        selectedTable + ' <span class="text-xs bg-amber-100 text-amber-900 px-2 py-0.5 rounded ml-2">Editing</span>';
                    renderMenu();
                    renderCart();
                })
                .catch(function(err) {
                    existingOrder = null;
                    renderMenu();
                    renderCart();
                });
        }

        function renderMenu() {
            var grid = document.getElementById('menu-grid');

            if (menu.length === 0) {
                grid.innerHTML = '<p class="text-slate-400 text-center py-8 col-span-3">No items available</p>';
                return;
            }

            var html = '';
            menu.forEach(function(item) {
                var qty = cart[item.item_id] || 0;
                html += '<button onclick="updateQty(\'' + item.item_id + '\', 1)" class="border-2 border-slate-200 rounded-xl p-4 hover:bg-blue-50 hover:border-blue-300 transition-all text-left group">';
                html += '<div class="text-sm text-slate-900 font-medium mb-1 line-clamp-2">' + item.item_name + '</div>';
                html += '<div class="text-lg text-blue-900 font-semibold">' + item.price.toLocaleString('vi-VN') + ' ₫</div>';
                html += '</button>';
            });
            grid.innerHTML = html;
        }

        function updateQty(itemId, delta) {
            if (!selectedTable) {
                showToast('Please select a table first!');
                return;
            }

            if (!cart[itemId]) {
                cart[itemId] = 0;
            }

            var existingQty = existingOrder ? (existingOrder.items.find(function(i) { return i.item_id === itemId; })?.qty || 0) : 0;
            var currentQty = cart[itemId];
            var newQty = currentQty + delta;

            if (newQty > existingQty) {
                newItemsOnly[itemId] = newQty - existingQty;
            } else if (newQty === existingQty) {
                delete newItemsOnly[itemId];
            } else {
                newItemsOnly[itemId] = Math.max(0, newQty - existingQty);
            }

            cart[itemId] = newQty;
            if (cart[itemId] <= 0) {
                delete cart[itemId];
                delete newItemsOnly[itemId];
            }

            renderMenu();
            renderCart();
        }

        function renderCart() {
            var container = document.getElementById('cart-items');
            var submitBtn = document.getElementById('submit-btn');
            var cartKeys = Object.keys(cart);
            var submitText = document.getElementById('submit-text');

            if (cartKeys.length === 0) {
                container.innerHTML = '<div class="flex items-center justify-center h-full"><p class="text-slate-400 text-center text-sm">Tap items to add</p></div>';
                document.getElementById('cart-total').textContent = '0 ₫';
                submitBtn.disabled = !selectedTable;
                return;
            }

            var html = '';
            var total = 0;

            cartKeys.forEach(function(itemId) {
                var qty = cart[itemId];
                var menuItem = menu.find(function(m) { return m.item_id === itemId; });
                if (!menuItem) return;

                var existingQty = existingOrder ? (existingOrder.items.find(function(i) { return i.item_id === itemId; })?.qty || 0) : 0;
                var isNew = qty > existingQty;
                var subtotal = menuItem.price * qty;
                total += subtotal;

                html += '<div class="border-2 border-slate-200 rounded-lg p-3">';
                html += '<div class="flex justify-between items-start mb-3">';
                html += '<div class="flex-1 pr-2">';
                html += '<div class="text-sm text-slate-900 font-medium line-clamp-2">' + menuItem.item_name;
                if (isNew && existingQty > 0) {
                    html += ' <span class="text-green-600 text-xs">(+' + (qty - existingQty) + ' more)</span>';
                }
                html += '</div>';
                html += '<div class="text-xs text-slate-500 mt-1">' + menuItem.price.toLocaleString('vi-VN') + ' ₫ each</div>';
                html += '</div>';
                html += '<button onclick="updateQty(\'' + itemId + '\', -1)" class="text-red-500 hover:text-red-600 hover:bg-red-50 p-1 rounded transition-colors">';
                html += '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>';
                html += '</button></div>';
                html += '<div class="flex items-center justify-between">';
                html += '<div class="flex items-center gap-2">';
                html += '<button onclick="updateQty(\'' + itemId + '\', -1)" class="p-1.5 bg-slate-200 rounded hover:bg-slate-300 transition-colors">';
                html += '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>';
                html += '</button>';
                html += '<span class="text-lg w-8 text-center font-semibold text-slate-900">' + qty + '</span>';
                html += '<button onclick="updateQty(\'' + itemId + '\', 1)" class="p-1.5 bg-slate-200 rounded hover:bg-slate-300 transition-colors">';
                html += '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>';
                html += '</button></div>';
                html += '<div class="-slate-900text-lg text font-semibold">' + subtotal.toLocaleString('vi-VN') + ' ₫</div>';
                html += '</div></div>';
            });

            container.innerHTML = html;
            document.getElementById('cart-total').textContent = total.toLocaleString('vi-VN') + ' ₫';
            submitBtn.disabled = !selectedTable;

            if (existingOrder) {
                submitText.textContent = 'Update Order';
            } else {
                submitText.textContent = 'Submit Order';
            }
        }

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'invisible');
            setTimeout(function() {
                toast.classList.add('opacity-0', 'invisible');
            }, 1500);
        }

        function submitOrder() {
            if (!selectedTable || Object.keys(cart).length === 0) return;

            var btn = document.getElementById('submit-btn');
            btn.disabled = true;

            var items = [];
            var total = 0;

            Object.keys(cart).forEach(function(itemId) {
                var menuItem = menu.find(function(m) { return m.item_id === itemId; });
                if (menuItem) {
                    var qty = cart[itemId];
                    items.push({
                        item_id: itemId,
                        item_name: menuItem.item_name,
                        qty: qty
                    });
                    total += menuItem.price * qty;
                }
            });

            var payload = {
                table: selectedTable,
                note: document.getElementById('order-note').value,
                items: items,
                order_total: total
            };

            var fetchPromise;
            var submitText = document.getElementById('submit-text');

            if (existingOrder) {
                // Update existing order in place
                fetchPromise = fetch(API_BASE + '/api/orders/' + existingOrder.order_id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                submitText.textContent = 'Updating...';
            } else {
                // Create new order
                fetchPromise = fetch(API_BASE + '/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                submitText.textContent = 'Submitting...';
            }

            fetchPromise
                .then(function(res) { return res.json(); })
                .then(function(order) {
                    cart = {};
                    newItemsOnly = {};
                    document.getElementById('order-note').value = '';
                    existingOrder = order;
                    renderMenu();
                    renderCart();
                    showToast('Order submitted!');

                    if (!isSpecialTable) {
                        setTimeout(function() {
                            window.location.href = '/tables.html';
                        }, 1000);
                    }
                })
                .catch(function(err) {
                    console.error(err);
                    alert('Failed to submit order');
                })
                .finally(function() {
                    btn.disabled = false;
                });
        }

        function goBackToTables() {
            window.location.href = '/tables.html';
        }

        function initSocket() {
            var socket = io();
            var statusEl = document.getElementById('connection-status');

            socket.on('connect', function() {
                statusEl.innerHTML = '<span class="w-2 h-2 bg-green-400 rounded-full"></span><span class="text-blue-100">Connected</span>';
            });

            socket.on('disconnect', function() {
                statusEl.innerHTML = '<span class="w-2 h-2 bg-amber-400 rounded-full"></span><span class="text-amber-200">Reconnecting...</span>';
            });
        }
    </script>
</body>
</html>
