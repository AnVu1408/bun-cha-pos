<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen - Bun Cha POS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Fixed Header -->
    <header class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-lg fixed top-0 left-0 right-0 z-50">
        <div class="px-6 py-3 flex items-center justify-between">
            <!-- Restaurant Name -->
            <div class="flex-1">
                <h1 class="text-xl tracking-wide font-semibold">Bún chả Hà Nội</h1>
                <p class="text-blue-200 text-xs">Minh Hương</p>
            </div>

            <!-- Navigation -->
            <nav class="flex gap-3">
                <a href="/tables.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-800/50 hover:bg-blue-700/70">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span>Waiter</span>
                </a>
                <a href="/kitchen.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-700 shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    <span>Kitchen</span>
                </a>
                <a href="/excel.html" class="flex items-center gap-2 px-6 py-2.5 rounded-lg transition-all bg-blue-800/50 hover:bg-blue-700/70">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <span>Excel</span>
                </a>
            </nav>

            <!-- Right Side -->
            <div class="flex items-center gap-4">
                <span id="clock" class="text-xl font-semibold font-mono">--:--</span>
                <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 bg-blue-800 rounded-full text-xs">
                    <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                    <span class="text-blue-100">Connected</span>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-20 px-6 pb-6">
        <div class="max-w-7xl mx-auto">
            <div class="mb-6">
                <h1 class="text-2xl font-semibold text-slate-800">Kitchen Display</h1>
                <p class="text-slate-500 text-sm mt-1">Active orders ready for preparation</p>
            </div>

            <div id="orders-grid" class="grid grid-cols-3 gap-4">
                <div class="col-span-3 text-center py-16">
                    <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/>
                        </svg>
                    </div>
                    <p class="text-slate-400 text-lg">No active orders</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Audio for new orders and 3+ min pending -->
    <audio id="new-order-sound" preload="auto">
        <source src="sound.mp3" type="audio/mp3">
    </audio>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 px-4 py-3 bg-slate-800 text-white rounded-lg shadow-lg text-sm font-medium opacity-0 invisible transition-all duration-300 z-50"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        var API_BASE = 'http://localhost:3003';
        var orders = [];
        var socket;
        var playedSoundForOrders = new Set();

        document.addEventListener('DOMContentLoaded', function() {
            updateClock();
            setInterval(updateClock, 1000);
            // Update timers every second
            setInterval(updateAllTimers, 1000);
            // Check for 3+ minute orders every 30 seconds
            setInterval(checkPendingTime, 30000);
            initSocket();
            loadOrders();
        });

        function updateClock() {
            var now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        }

        function initSocket() {
            socket = io();
            var statusEl = document.getElementById('connection-status');

            socket.on('connect', function() {
                statusEl.innerHTML = '<span class="w-2 h-2 bg-green-400 rounded-full"></span><span class="text-blue-100">Connected</span>';
            });

            socket.on('disconnect', function() {
                statusEl.innerHTML = '<span class="w-2 h-2 bg-amber-400 rounded-full"></span><span class="text-amber-200">Reconnecting...</span>';
            });

            socket.on('new_order', function() {
                loadOrders();
            });

            socket.on('order_served', function() {
                loadOrders();
            });

            socket.on('order_paid', function() {
                loadOrders();
            });

            socket.on('orders_update', function(data) {
                orders = data.orders;
                renderOrders();
            });
        }

        function loadOrders() {
            fetch(API_BASE + '/api/orders/active')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    orders = data;
                    // Clear sound tracking for orders that no longer exist
                    playedSoundForOrders.forEach(function(key) {
                        var orderId = key.split('_')[0];
                        if (!orders.find(function(o) { return o.order_id === orderId; })) {
                            playedSoundForOrders.delete(key);
                        }
                    });
                    renderOrders();
                })
                .catch(function(err) {
                    console.error('Failed to load orders:', err);
                });
        }

        function getWaitingMinutes(timestamp) {
            var created = new Date(timestamp);
            var now = new Date();
            return Math.floor((now - created) / 60000);
        }

        function renderOrders() {
            var grid = document.getElementById('orders-grid');

            if (orders.length === 0) {
                grid.innerHTML = '<div class="col-span-3 text-center py-16"><div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4"><svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg></div><p class="text-slate-400 text-lg">No active orders</p></div>';
                return;
            }

            var html = '';
            orders.forEach(function(order) {
                html += '<div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200 hover:shadow-md transition-shadow" data-order-id="' + order.order_id + '" data-timestamp="' + order.created_timestamp + '">';
                html += '<div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-start">';
                html += '<div><div class="text-xs font-semibold text-slate-500 uppercase tracking-wide">' + order.order_id + '</div>';
                html += '<div class="text-xl font-semibold text-slate-800 mt-1">' + order.table + '</div></div>';
                html += '<div class="text-right"><div class="text-xs text-slate-500 uppercase">Waiting</div>';
                html += '<div class="timer-display text-2xl font-bold text-slate-900">--:--</div></div>';
                html += '</div>';

                html += '<div class="p-4">';
                html += '<div class="space-y-2">';
                order.items.forEach(function(item) {
                    var isSpecial = item.item_name.includes('Giay') || item.item_name.includes('Cha');
                    html += '<div class="flex justify-between items-center">';
                    html += '<span class="flex items-center gap-2"><span class="font-semibold text-slate-900 w-6">' + item.qty + 'x</span>';
                    html += '<span class="' + (isSpecial ? 'text-red-600 font-medium' : 'text-slate-700') + '">' + item.item_name + '</span></span>';
                    html += '</div>';
                });
                html += '</div>';

                if (order.note && order.note.trim()) {
                    html += '<div class="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg">';
                    html += '<div class="text-xs font-semibold text-amber-800 uppercase mb-1">Note</div>';
                    html += '<div class="text-sm text-amber-900">' + order.note + '</div>';
                    html += '</div>';
                }
                html += '</div>';

                html += '<div class="p-4 border-t border-slate-100">';
                html += '<button onclick="serveOrder(\'' + order.order_id + '\')" class="w-full py-3 bg-blue-900 text-white rounded-lg font-medium hover:bg-blue-800 transition-colors flex items-center justify-center gap-2">';
                html += '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                html += 'SERVE</button></div></div>';
            });

            grid.innerHTML = html;
            updateAllTimers();
        }

        function updateAllTimers() {
            var now = new Date();
            document.querySelectorAll('[data-order-id]').forEach(function(card) {
                var orderId = card.dataset.orderId;
                var timestamp = new Date(card.dataset.timestamp);
                var elapsed = now - timestamp;
                var totalSeconds = Math.floor(elapsed / 1000);
                var mins = Math.floor(totalSeconds / 60);
                var secs = totalSeconds % 60;
                var timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;

                var timerEl = card.querySelector('.timer-display');
                if (timerEl) {
                    timerEl.textContent = timeStr;

                    // Update color based on time
                    if (mins >= 10) {
                        timerEl.className = 'timer-display text-2xl font-bold text-red-600 animate-pulse';
                    } else if (mins >= 5) {
                        timerEl.className = 'timer-display text-2xl font-bold text-yellow-500 animate-pulse';
                    } else if (mins >= 3) {
                        timerEl.className = 'timer-display text-2xl font-bold text-amber-600';
                    } else {
                        timerEl.className = 'timer-display text-2xl font-bold text-slate-900';
                    }
                }
            });
        }

        function serveOrder(orderId) {
            // Clear all sound keys for this order
            playedSoundForOrders.forEach(function(key) {
                if (key.startsWith(orderId + '_')) {
                    playedSoundForOrders.delete(key);
                }
            });
            fetch(API_BASE + '/api/orders/' + orderId + '/serve', { method: 'POST' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    loadOrders();
                })
                .catch(function(err) {
                    console.error('Failed to serve order:', err);
                    alert('Failed to serve order');
                });
        }

        function playNewOrderSound() {
            try {
                var audio = document.getElementById('new-order-sound');
                audio.volume = 0.5;
                audio.currentTime = 0;
                audio.play().catch(function(e) {
                    console.log('Audio play failed:', e);
                });
            } catch(e) {
                console.log('Audio not available');
            }
        }

        function checkPendingTime() {
            var now = new Date();
            orders.forEach(function(order) {
                var created = new Date(order.created_timestamp);
                var elapsed = now - created;
                var mins = Math.floor(elapsed / 60000);
                var secs = Math.floor((elapsed % 60000) / 1000);

                // Play sound at exactly 3, 5, and 10 minutes
                var soundAt = [3, 5, 10];
                var shouldPlay = false;

                soundAt.forEach(function(min) {
                    var threshold = min * 60 * 1000;
                    if (elapsed >= threshold && elapsed < threshold + 30000) {
                        var key = order.order_id + '_' + min;
                        if (!playedSoundForOrders.has(key)) {
                            playedSoundForOrders.add(key);
                            shouldPlay = true;
                        }
                    }
                });

                if (shouldPlay) {
                    playNewOrderSound();
                    console.log('Order ' + order.order_id + ' at ' + mins + ' min - playing sound');
                }
            });
        }
    </script>
</body>
</html>
